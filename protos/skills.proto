syntax = "proto3";

package skills;

service SkillsService {
    rpc AnalyzeSkillGap (SkillGapRequest) returns (SkillGapResponse);
    rpc RecommendTraining (TrainingRequest) returns (TrainingResponse);
    rpc SubmitSkillUpdates (stream SkillUpdateRequest) returns (SkillUpdateSummary);
}

message SkillGapRequest {
    string job_seeker_id = 1;
    string target_job_id = 2;
    repeated string current_skills = 3;
    repeated string required_skills = 4;
}

message SkillGapResponse {
    repeated string missing_skills = 1;
    string message = 2;
}

message TrainingRequest {
    repeated string missing_skills = 1;
}

message TrainingResponse {
    repeated string recommended_courses = 1;
    string message = 2;
}

message SkillUpdateRequest {
    string job_seeker_id = 1;
    string skill = 2;
}

message SkillUpdateSummary {
    string job_seeker_id = 1;
    int32 total_skills_received = 2;
    repeated string received_skills = 3;
    string message = 4;
}
